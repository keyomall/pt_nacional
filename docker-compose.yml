version: '3.8'

services:
  db:
    build: ./docker/db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: enterprise_password_2024
      POSTGRES_DB: elecciones_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d elecciones_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
    driver: local
